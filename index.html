<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mô phỏng Cơ học - Vật Lý</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #ecf0f1; overflow: hidden; display: flex; width: 100vw; height: 100vh; }
        
        #sim-section { position: relative; height: 100%; background: #fff; overflow: hidden; flex-grow: 1; }
        #chart-section { height: 100%; background: #fff; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; width: 450px; border-left: 2px solid #bdc3c7; }
        
        #splitter { width: 10px; cursor: col-resize; background: #bdc3c7; height: 100%; z-index: 100; transition: background 0.2s; }
        #splitter:hover { background: var(--accent); }

        /* Đã xóa #menu-toggle và thiết lập #controls hiển thị cố định */
        #controls { position: absolute; top: 15px; left: 15px; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 100; width: 220px; border: 1px solid #e0e0e0; }

        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: var(--primary); }
        input[type="range"] { width: 100%; cursor: pointer; }
        button { cursor: pointer; border: none; border-radius: 4px; background: var(--primary); color: white; font-weight: bold; width: 100%; padding: 8px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .pause-active { background: var(--accent) !important; }
        #stats { margin-top: 10px; padding: 8px; background: #f8f9fa; border-left: 3px solid var(--accent); font-size: 13px; color: var(--primary); }
    </style>
</head>
<body>

    <div id="sim-section">
        <div id="controls">
            <div class="control-group">
                <button id="playPauseBtn" class="pause-active">Tạm dừng</button>
                <button id="resetBtn" style="margin-top:5px; background:#95a5a6;">Reset</button>
            </div>
            <div class="control-group">
                <label>Bán kính (R): <span id="rVal">50</span>px</label>
                <input type="range" id="radiusSlider" min="20" max="80" value="50">
            </div>
            <div class="control-group">
                <label>Vận tốc góc (ω): <span id="wVal">0.10</span></label>
                <input type="range" id="speedSlider" min="0" max="0.3" step="0.01" value="0.10">
            </div>
            <div id="stats">Chu kỳ: <strong id="periodVal">--</strong> (s)</div>
        </div>
    </div>

    <div id="splitter"></div>

    <div id="chart-section">
        <h4 style="margin:0 0 10px 0; color: var(--primary);">Phân tích Dao động (Y)</h4>
        <div style="flex:1; min-height:0;"><canvas id="motionChart"></canvas></div>
    </div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Vector, Events } = Matter;

const engine = Engine.create();
const simSection = document.getElementById('sim-section');
const chartSection = document.getElementById('chart-section');

const render = Render.create({
    element: simSection,
    engine: engine,
    options: { 
        width: simSection.clientWidth, 
        height: simSection.clientHeight, 
        wireframes: false, 
        background: '#fff' 
    }
});

// Tạo vật thể
let radius = 50;
let wheel = Bodies.circle(200, 300, radius, { 
    friction: 0.1, 
    restitution: 0.3, 
    render: { fillStyle: '#3498db' }
});

// Mặt đất vô hạn
const ground = Bodies.rectangle(200, 580, 4000, 40, { 
    isStatic: true, 
    render: { fillStyle: '#2c3e50' } 
});

Composite.add(engine.world, [wheel, ground]);

// Biến trạng thái
let trail = [];
let isPaused = false;
let angularVelocity = 0.10;
let zoomLevel = 1;

// --- Splitter Logic ---
const splitter = document.getElementById('splitter');
let isResizing = false;

splitter.addEventListener('mousedown', () => isResizing = true);
document.addEventListener('mouseup', () => isResizing = false);
document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    let offsetLeft = e.clientX;
    if (offsetLeft > 300 && (window.innerWidth - offsetLeft) > 200) {
        simSection.style.flex = "none";
        simSection.style.width = offsetLeft + 'px';
        chartSection.style.width = (window.innerWidth - offsetLeft - 10) + 'px';
        render.options.width = offsetLeft;
        render.canvas.width = offsetLeft;
    }
});

// --- Chart Setup ---
const ctx = document.getElementById('motionChart').getContext('2d');
let motionChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Vị trí Y', data: [], borderColor: '#e74c3c', borderWidth: 2, fill: false, pointRadius: 0 }]},
    options: { maintainAspectRatio: false, scales: { x: { display: false }, y: { reverse: true, min: 0, max: 600 } }, animation: false }
});

// --- Vòng lặp Update ---
Events.on(engine, 'beforeUpdate', () => {
    if (isPaused) { engine.timing.timeScale = 0; return; }
    engine.timing.timeScale = 1;
    
    // Mặt đất chạy theo bánh xe
    Body.setPosition(ground, { x: wheel.position.x, y: ground.position.y });

    Body.setAngularVelocity(wheel, angularVelocity);
    if (wheel.velocity.x < 3) Body.setVelocity(wheel, { x: 5, y: wheel.velocity.y });
});

Events.on(engine, 'afterUpdate', () => {
    if (isPaused) return;

    // Tracking Camera
    Render.lookAt(render, {
        min: { x: wheel.position.x - (render.options.width / 2) / zoomLevel, y: 0 },
        max: { x: wheel.position.x + (render.options.width / 2) / zoomLevel, y: 600 / zoomLevel }
    });

    const worldPoint = Vector.add(wheel.position, Vector.rotate({ x: radius, y: 0 }, wheel.angle));
    trail.push({ x: worldPoint.x, y: worldPoint.y });
    if (trail.length > 500) trail.shift();

    motionChart.data.labels.push("");
    motionChart.data.datasets[0].data.push(worldPoint.y);
    if (motionChart.data.labels.length > 100) {
        motionChart.data.labels.shift();
        motionChart.data.datasets[0].data.shift();
    }
    motionChart.update();
});

// --- Vẽ đường track ---
Events.on(render, 'afterRender', () => {
    const context = render.context;
    Matter.Render.startViewTransform(render);
    
    context.beginPath();
    context.strokeStyle = '#e74c3c';
    context.lineWidth = 2 / zoomLevel; 
    for (let i = 0; i < trail.length; i++) {
        context.lineTo(trail[i].x, trail[i].y);
    }
    context.stroke();

    const worldPoint = Vector.add(wheel.position, Vector.rotate({ x: radius, y: 0 }, wheel.angle));
    context.beginPath();
    context.arc(worldPoint.x, worldPoint.y, 6 / zoomLevel, 0, 2 * Math.PI);
    context.fillStyle = '#e74c3c';
    context.fill();

    Matter.Render.endViewTransform(render);
});

// --- UI Event Handlers ---
// Đã xóa sự kiện click của menu-toggle

document.getElementById('radiusSlider').oninput = (e) => {
    const newR = parseInt(e.target.value);
    const scale = newR / radius;
    Body.scale(wheel, scale, scale);
    radius = newR;
    document.getElementById('rVal').innerText = newR;
};

document.getElementById('speedSlider').oninput = (e) => {
    angularVelocity = parseFloat(e.target.value);
    document.getElementById('wVal').innerText = angularVelocity.toFixed(2);
    document.getElementById('periodVal').innerText = angularVelocity > 0 ? (2 * Math.PI / (angularVelocity * 60)).toFixed(2) : "∞";
};

document.getElementById('playPauseBtn').onclick = function() {
    isPaused = !isPaused;
    this.innerText = isPaused ? "Tiếp tục" : "Tạm dừng";
    this.classList.toggle('pause-active', !isPaused);
};

document.getElementById('resetBtn').onclick = () => location.reload();

simSection.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomLevel += e.deltaY * -0.001;
    zoomLevel = Math.max(0.5, Math.min(zoomLevel, 2.5));
});

Render.run(render);
Runner.run(Runner.create(), engine);
</script>
</body>
</html>
